<!DOCTYPE html>
<html lang="en" class="imissive-theme">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Request SMS and Digital Communication service brief from iMissive"/>
<title>Request Service Brief - iMissive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/rassco.css"/>
</head>
<body class="contact-template-page contact-template-page--imissive">
  <a class="skip-link" href="#imissive-form">Skip to form</a>
  <h1 class="contact-template-title">Request Service Brief</h1>
  <p class="contact-template-note">Fill in your details and submit. Your message will be sent to info@imissive.com.</p>
  <div id="imissive-status" class="contact-template-success" hidden></div>

  <div class="contact-template-wrap contact-template-wrap--imissive">
    <form id="imissive-form" class="contact-template-form contact-template-form--imissive" method="POST" action="https://formsubmit.co/info@imissive.com">
      <input type="hidden" name="_subject" value="iMissive Website Service Brief Request"/>
      <input type="hidden" name="_template" value="table"/>
      <input type="hidden" name="_captcha" value="false"/>

      <div class="contact-template-row">
        <label class="contact-template-label" for="imissive-name">Your Name</label>
        <input id="imissive-name" class="contact-template-input" type="text" name="name" autocomplete="name"/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="imissive-phone">Phone Number*</label>
        <input id="imissive-phone" class="contact-template-input" type="tel" name="phone" required inputmode="numeric" pattern="[0-9]{7,15}" maxlength="15" autocomplete="tel" title="Please enter numbers only (7 to 15 digits)."/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="imissive-email">Your Email*</label>
        <input id="imissive-email" class="contact-template-input" type="email" name="email" required autocomplete="email" title="Please enter a valid email address."/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="imissive-company">Your Company</label>
        <input id="imissive-company" class="contact-template-input" type="text" name="company" autocomplete="organization"/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="imissive-subject">Subject*</label>
        <input id="imissive-subject" class="contact-template-input" type="text" name="subject" required value="SMS &amp; Digital Communication Service Brief"/>
      </div>

      <div class="contact-template-row contact-template-row--message">
        <label class="contact-template-label" for="imissive-message">Question / Required Service*</label>
        <textarea id="imissive-message" class="contact-template-textarea" name="message" required></textarea>
      </div>

      <div class="contact-template-row contact-template-row--logo">
        <div class="contact-template-logo-cell">
          <img class="contact-template-logo contact-template-logo--imissive" src="assets/images/logo-imissive.png" alt="iMissive"/>
        </div>
        <div class="contact-template-action-cell">
          <button class="contact-template-submit" type="submit">Submit</button>
        </div>
      </div>
    </form>
  </div>

  <div id="imissive-modal" class="contact-modal" hidden>
    <div class="contact-modal-backdrop"></div>
    <div class="contact-modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="imissive-modal-title">
      <h2 id="imissive-modal-title">Thank You!</h2>
      <p>Your request has been submitted successfully. The iMissive team will contact you soon.</p>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById("imissive-form");
      var status = document.getElementById("imissive-status");
      var modal = document.getElementById("imissive-modal");
      var submitButton = form.querySelector("button[type='submit']");
      var phoneInput = document.getElementById("imissive-phone");
      var redirectUrl = "/what-we-deliver.html";

      phoneInput.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "").slice(0, 15);
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        status.hidden = true;
        submitButton.disabled = true;
        submitButton.textContent = "Sending...";

        var formData = new FormData(form);
        fetch("https://formsubmit.co/ajax/info@imissive.com", {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: formData
        })
          .then(function (response) {
            if (!response.ok) throw new Error("Request failed");
            return response.json();
          })
          .then(function () {
            modal.hidden = false;
            setTimeout(function () {
              window.location.href = redirectUrl;
            }, 2200);
          })
          .catch(function () {
            status.textContent = "Unable to submit right now. Please try again in a moment.";
            status.hidden = false;
          })
          .finally(function () {
            submitButton.disabled = false;
            submitButton.textContent = "Submit";
          });
      });
    })();
  </script>
</body>
</html>
