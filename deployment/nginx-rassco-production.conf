# =============================================================================
# RASSCO static site — Nginx production template (HTTPS)
# =============================================================================
# Delivery-only: compression, caching headers, security headers, clean URLs.
# Does not change HTML/CSS/content in the repository.
#
# Usage:
#   1) Set `root` to your deployed site directory (files from this repo).
#   2) Configure `ssl_certificate` / `ssl_certificate_key` (or your distro layout).
#   3) Include this file inside `http { }` or paste the `server { }` block.
#   4) Test and reload:  nginx -t && systemctl reload nginx
#
# Optional (not in this file): HTTP → HTTPS redirect server on port 80.
# Optional: `brotli` if your nginx build includes ngx_brotli — enable in `http {}`.
# =============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name www.rassco.com rassco.com;

    # --- TLS: set paths for your environment ---
    # ssl_certificate     /etc/ssl/certs/rassco/fullchain.pem;
    # ssl_certificate_key /etc/ssl/private/rassco/privkey.pem;

    # Document root: directory that contains index.html, assets/, ar/, sectors/, …
    root /var/www/rassco;
    index index.html;

    # -------------------------------------------------------------------------
    # Performance: gzip (text/html is compressed by default when gzip is on)
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Performance: reduce file metadata lookups for static files (safe for static roots)
    # -------------------------------------------------------------------------
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # -------------------------------------------------------------------------
    # Security headers (site uses inline style= for backgrounds; CSP allows that)
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Google Fonts (Montserrat + Noto Kufi Arabic) + self-hosted JS/CSS/images
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # -------------------------------------------------------------------------
    # Performance: long cache for static file *extensions* (HTML uses extensionless URLs)
    # Uses `expires` only (not add_header) so server-level security headers stay applied.
    # Filenames are not fingerprinted — adjust max-age if you deploy frequent asset updates.
    # -------------------------------------------------------------------------
    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Clean URLs: hide .html in the address bar
    # /index.html          -> /
    # /ar/index.html       -> /ar/
    # /what-we-deliver.html -> /what-we-deliver
    # -------------------------------------------------------------------------
    location ~ ^(?<base>/.*)\.html$ {
        if ($base = "/index") {
            return 301 /;
        }
        if ($base = "/ar/index") {
            return 301 /ar/;
        }
        return 301 $base$is_args$args;
    }

    # -------------------------------------------------------------------------
    # Default: map clean paths to .html files on disk
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

# -----------------------------------------------------------------------------
# Optional: HTTP → HTTPS (place in same config file; separate server block)
