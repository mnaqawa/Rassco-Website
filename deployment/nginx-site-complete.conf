# =============================================================================
# RASSCO — complete Nginx config (replace your current site blocks with this)
# =============================================================================
# - Clean URLs: /page → page.html; optional direct .html → 301 to extensionless
# - Security headers preserved on CSS/JS/images: no add_header in static location
# - HTML (extensionless): short cache via expires -1 in location /
# - Test: nginx -t && systemctl reload nginx
# =============================================================================

# --- HTTPS: apex (main site) ---
server {
  # http2 only on one listen per address:port (avoids "protocol options redefined")
  listen 443 ssl http2;
  listen [::]:443 ssl;

  server_name rassco.com;

  root /var/www/rassco;
  index index.html;

  server_tokens off;

  if ($request_method !~ ^(GET|HEAD)$) {
    return 405;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  autoindex off;

  ssl_certificate     /etc/letsencrypt/live/rassco.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rassco.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;
  ssl_session_tickets off;

  # OCSP stapling (uncomment when resolver is available)
  # ssl_stapling on;
  # ssl_stapling_verify on;
  # resolver 1.1.1.1 1.0.0.1 8.8.8.8 valid=300s;
  # resolver_timeout 5s;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self'; upgrade-insecure-requests;" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_comp_level 5;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml application/rss+xml image/svg+xml;

  # Static assets: use only `expires` here so server-level security headers are NOT dropped
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    expires 30d;
  }

  # Strip .html from public URLs (301 to extensionless path on this host)
  location ~ ^(?<base>/.*)\.html$ {
    if ($base = "/index") {
      return 301 /;
    }
    if ($base = "/ar/index") {
      return 301 /ar/;
    }
    return 301 $base$is_args$args;
  }

  # Extensionless URLs resolve to *.html on disk
  location / {
    try_files $uri $uri/ $uri.html =404;
    expires -1;
  }

  access_log /var/log/nginx/rassco.access.log;
  error_log  /var/log/nginx/rassco.error.log warn;
}

# --- HTTPS: www → apex ---
server {
  # Same socket as above: do not repeat http2 here
  listen 443 ssl;
  listen [::]:443 ssl;

  server_name www.rassco.com;

  ssl_certificate     /etc/letsencrypt/live/rassco.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rassco.com/privkey.pem;

  return 301 https://rassco.com$request_uri;
}

# --- HTTP → HTTPS ---
server {
  listen 80;
  listen [::]:80;

  server_name rassco.com www.rassco.com;

  return 301 https://rassco.com$request_uri;
}
