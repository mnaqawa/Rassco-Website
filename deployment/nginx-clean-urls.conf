# =============================================================================
# RASSCO — clean URL rules only (legacy include fragment)
# =============================================================================
# Full production template (gzip, security headers, asset caching + clean URLs):
#   see `nginx-rassco-production.conf` in this folder.
#
# If you still include only this file, paste the two `location` blocks below into
# your `server { }` and add gzip + headers from the full template when ready.
# =============================================================================

# 1) Redirect explicit .html requests to clean URLs
#    /index.html               -> /
#    /what-we-deliver.html     -> /what-we-deliver
#    /ar/index.html            -> /ar/
#    /ar/what-we-deliver.html  -> /ar/what-we-deliver
location ~ ^(?<base>/.*)\.html$ {
    if ($base = "/index") {
        return 301 /;
    }
    if ($base = "/ar/index") {
        return 301 /ar/;
    }
    return 301 $base$is_args$args;
}

# 2) Serve clean URLs by mapping to .html files
#    /foo       -> /foo.html
#    /ar/foo    -> /ar/foo.html
location / {
    try_files $uri $uri/ $uri.html =404;
}
