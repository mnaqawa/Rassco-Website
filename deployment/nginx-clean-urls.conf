# RASSCO clean URL rules (Nginx)
# Goal: hide .html filenames from public URLs
#
# Usage:
# - Include this inside your HTTPS server block for rassco.com
# - Ensure root points to your deployed static site directory
# - Test and reload:
#     nginx -t && systemctl reload nginx

# 1) Redirect explicit .html requests to clean URLs
#    /index.html               -> /
#    /what-we-deliver.html     -> /what-we-deliver
#    /ar/index.html            -> /ar/
#    /ar/what-we-deliver.html  -> /ar/what-we-deliver
location ~ ^(?<base>/.*)\.html$ {
    if ($base = "/index") {
        return 301 /;
    }
    if ($base = "/ar/index") {
        return 301 /ar/;
    }
    return 301 $base$is_args$args;
}

# 2) Serve clean URLs by mapping to .html files
#    /foo       -> /foo.html
#    /ar/foo    -> /ar/foo.html
location / {
    try_files $uri $uri/ $uri.html =404;
}

