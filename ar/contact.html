<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="تواصل مع مجموعة راسكو"/>
<title>تواصل معنا - مجموعة راسكو</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&amp;family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/rassco.css"/>
</head>
<body class="contact-template-page">
  <a class="skip-link" href="#contact-form">تخطي إلى النموذج</a>
  <h1 class="contact-template-title">تواصل معنا</h1>
  <p class="contact-template-note">يرجى تعبئة البيانات ثم الضغط على إرسال. ستصل رسالتك إلى info@rassco.com.</p>
  <div id="contact-success" class="contact-template-success" hidden>شكرا لك. تم إرسال رسالتك بنجاح.</div>

  <div class="contact-template-wrap">
    <form id="contact-form" class="contact-template-form" method="POST" action="https://formsubmit.co/info@rassco.com">
      <input type="hidden" name="_subject" value="Arabic Website Contact Form Submission"/>
      <input type="hidden" name="_template" value="table"/>
      <input type="hidden" name="_captcha" value="false"/>
      <input type="hidden" name="_next" value="https://www.rassco.com/ar/contact.html?submitted=1"/>

      <div class="contact-template-row">
        <label class="contact-template-label" for="contact-name">الاسم</label>
        <input id="contact-name" class="contact-template-input" type="text" name="name" autocomplete="name"/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="contact-phone">رقم الهاتف*</label>
        <input id="contact-phone" class="contact-template-input" type="tel" name="phone" required inputmode="numeric" pattern="[0-9]{7,15}" maxlength="15" autocomplete="tel" title="يرجى إدخال أرقام فقط (من 7 إلى 15 رقم)."/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="contact-email">البريد الإلكتروني*</label>
        <input id="contact-email" class="contact-template-input" type="email" name="email" required autocomplete="email" title="يرجى إدخال بريد إلكتروني صحيح."/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="contact-company">اسم الشركة</label>
        <input id="contact-company" class="contact-template-input" type="text" name="company" autocomplete="organization"/>
      </div>

      <div class="contact-template-row">
        <label class="contact-template-label" for="contact-subject">الموضوع*</label>
        <input id="contact-subject" class="contact-template-input" type="text" name="subject" required/>
      </div>

      <div class="contact-template-row contact-template-row--message">
        <label class="contact-template-label" for="contact-message">السؤال / الخدمة المطلوبة*</label>
        <textarea id="contact-message" class="contact-template-textarea" name="message" required></textarea>
      </div>

      <div class="contact-template-row contact-template-row--logo">
        <div class="contact-template-logo-cell">
          <img class="contact-template-logo" src="../assets/images/rassco-logo.png" alt="مجموعة راسكو"/>
        </div>
        <div class="contact-template-action-cell">
        <button class="contact-template-submit" type="submit">إرسال</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var success = document.getElementById("contact-success");
      if (params.get("submitted") === "1") {
        success.hidden = false;
      }
    })();
  </script>
</body>
</html>
