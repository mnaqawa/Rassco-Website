<!DOCTYPE html>
<html lang="ar" dir="rtl" class="cx-theme">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="طلب عرض خدمة الحلول اللوجستية الطبية من راسكو"/>
<title>طلب الخدمة - الحلول اللوجستية الطبية</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&amp;family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/rassco.css"/>
</head>
<body class="contact-template-page contact-template-page--cx">
  <a class="skip-link" href="#cx-form">تخطي إلى النموذج</a>
  <h1 class="contact-template-title">طلب الخدمة</h1>
  <p class="contact-template-note">يرجى تعبئة البيانات ثم الضغط على إرسال. ستصل رسالتك إلى info@rassco.com.</p>
  <div id="cx-status" class="contact-template-success" hidden></div>

  <div class="contact-template-wrap contact-template-wrap--cx">
    <form id="cx-form" class="contact-template-form contact-template-form--cx" method="POST" action="https://formsubmit.co/info@rassco.com">
      <input type="hidden" name="_subject" value="Arabic RASSCO Commercial Excellence Service Brief Request"/>
      <input type="hidden" name="_template" value="table"/>
      <input type="hidden" name="_captcha" value="false"/>

      <div class="contact-template-row"><label class="contact-template-label" for="cx-name">الاسم</label><input id="cx-name" class="contact-template-input" type="text" name="name" autocomplete="name"/></div>
      <div class="contact-template-row"><label class="contact-template-label" for="cx-phone">رقم الهاتف*</label><input id="cx-phone" class="contact-template-input" type="tel" name="phone" required inputmode="numeric" pattern="[0-9]{7,15}" maxlength="15" autocomplete="tel" title="يرجى إدخال أرقام فقط (من 7 إلى 15 رقم)."/></div>
      <div class="contact-template-row"><label class="contact-template-label" for="cx-email">البريد الإلكتروني*</label><input id="cx-email" class="contact-template-input" type="email" name="email" required autocomplete="email" title="يرجى إدخال بريد إلكتروني صحيح."/></div>
      <div class="contact-template-row"><label class="contact-template-label" for="cx-company">اسم الشركة</label><input id="cx-company" class="contact-template-input" type="text" name="company" autocomplete="organization"/></div>
      <div class="contact-template-row"><label class="contact-template-label" for="cx-subject">الموضوع*</label><input id="cx-subject" class="contact-template-input" type="text" name="subject" required value="طلب خدمة الحلول اللوجستية الطبية"/></div>
      <div class="contact-template-row contact-template-row--message"><label class="contact-template-label" for="cx-message">السؤال / الخدمة المطلوبة*</label><textarea id="cx-message" class="contact-template-textarea" name="message" required></textarea></div>
      <div class="contact-template-row contact-template-row--logo">
        <div class="contact-template-logo-cell"><img class="contact-template-logo contact-template-logo--cx" src="../assets/images/logo-cx.png" alt="Commercial Excellence"/></div>
        <div class="contact-template-action-cell"><button class="contact-template-submit" type="submit">إرسال</button></div>
      </div>
    </form>
  </div>

  <div id="cx-modal" class="contact-modal" hidden>
    <div class="contact-modal-backdrop"></div>
    <div class="contact-modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="cx-modal-title">
      <h2 id="cx-modal-title">شكرا لكم</h2>
      <p>تم استلام طلبكم بنجاح، وسيقوم فريق راسكو بالتواصل معكم في أقرب وقت.</p>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById("cx-form");
      var status = document.getElementById("cx-status");
      var modal = document.getElementById("cx-modal");
      var submitButton = form.querySelector("button[type='submit']");
      var phoneInput = document.getElementById("cx-phone");

      phoneInput.addEventListener("input", function () { this.value = this.value.replace(/\D/g, "").slice(0, 15); });
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        status.hidden = true;
        submitButton.disabled = true;
        submitButton.textContent = "جاري الإرسال...";
        fetch("https://formsubmit.co/ajax/info@rassco.com", { method: "POST", headers: { "Accept": "application/json" }, body: new FormData(form) })
          .then(function (response) { if (!response.ok) throw new Error("Request failed"); return response.json(); })
          .then(function () { modal.hidden = false; setTimeout(function () { window.location.href = "/ar/what-we-deliver.html"; }, 2200); })
          .catch(function () { status.textContent = "تعذر إرسال الطلب حاليا. يرجى المحاولة مرة أخرى بعد قليل."; status.hidden = false; })
          .finally(function () { submitButton.disabled = false; submitButton.textContent = "إرسال"; });
      });
    })();
  </script>
</body>
</html>
